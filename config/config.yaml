# Whisper Fine-tuning Configuration
model:
  name: "openai/whisper-base"
  max_length: 256
  language: "ar"
  task: "transcribe"
  generation_config:
    num_beams: 5
    repetition_penalty: 1.2
    no_repeat_ngram_size: 3
    early_stopping: true
  lora:
    enabled: true
    r: 32
    alpha: 64
    target_modules: ["q_proj", "v_proj"]
    dropout: 0.05
    bias: "none"


data:
  source: "kaggle"
  streaming: true
  shuffle_buffer_size: 1000
  csv_path: ""
  metadata_path: "transcripts.tsv"
  readerlist_path: "readerlist.tsv"
  allowed_readers: [
    "Abdullaah_3awwaad_Al-Juhaynee_128kbps", 
    "Abdurrahmaan_As-Sudais_64kbps",
    "tunaiji_64kbps",
    "husary_qasr_64kbps",
    "Yasser_Ad-Dussary_128kbps",
    "Saood_ash-Shuraym_64kbps",
    "Muhsin_Al_Qasim_192kbps",
    "Hudhaify_64kbps",
    "Hani_Rifai_192kbps"
  ]
  kaggle_dataset: "bigguyubuntu/quran-ayat-speech-to-text"
  kaggle_file_path: ""
  audio_column: "PATH"
  text_column: "TRANSCRIPT"
  duration_column: "DURATION"
  sampling_rate: 16000
  max_duration: 30.0  # seconds (Whisper's limit)
  min_duration: 0.5   # seconds
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  eval_max_samples: 500  # Number of samples to materialize for evaluation

training:
  output_dir: "./models/whisper-finetuned"
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 1.0e-5
  weight_decay: 0.01
  warmup_steps: 1000
  max_grad_norm: 1.0
  num_train_epochs: null
  max_steps: 10000
  seed: 42
  lr_scheduler_type: "linear"
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_epsilon: 1.0e-8
  eval_steps: 100
  logging_steps: 50
  save_steps: 200
  save_total_limit: 3
  fp16: true
  gradient_checkpointing: true
  dataloader_num_workers: 0
  # dataloader_num_workers: 4
  remove_unused_columns: false
  load_best_model_at_end: true
  metric_for_best_model: "wer"
  greater_is_better: false
  report_to: null
  # report_to: ["tensorboard", "wandb"]

hyperparameter_tuning:
  enabled: false
  n_trials: 20
  search_space:
    learning_rate:
      type: "loguniform"
      low: 0.000001 #1e-6
      high: 0.0001 #1e-4
    per_device_train_batch_size:
      type: "choice"
      choices: [4, 8, 16]
    warmup_steps:
      type: "int"
      low: 50
      high: 200

evaluation:
  metrics: ["wer", "cer", "bleu"]
  generate_predictions: true
  save_predictions: true

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "./logs/training.log"

huggingface:
  push_to_hub: false
  hub_model_id: "alihassanshahid/whisper-base-finetuned"
  hub_private_repo: true
